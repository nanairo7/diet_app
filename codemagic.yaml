workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.nanairo.calorierecord
      vars:
        BUNDLE_ID: jp.nanairo.calorierecord
        XCODE_PROJECT: ios/Runner.xcodeproj
        XCODE_SCHEME: Runner
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      groups:
        - app_store_connect  # Codemagic ダッシュボードで設定するグループ

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Flutter パッケージ取得
        script: flutter pub get

      - name: Flutter 静的解析
        script: flutter analyze --no-fatal-infos

      - name: テスト実行
        script: flutter test

      - name: プロビジョニングプロファイルの適用
        script: xcode-project use-profiles

      - name: iOS ビルド (IPA)
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --build-name=$(cat pubspec.yaml | grep "^version:" | awk '{print $2}' | cut -d'+' -f1) \
            --export-options-plist=/Users/builder/export_options.plist

      - name: TestFlight へアップロード
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/authkey.p8
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/authkey.p8 \
            --testflight \
            --whats-new "Codemagic 自動ビルド (Build $BUILD_NUMBER)"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - register01010@gmail.com
        notify:
          success: true
          failure: true
