workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.nanairo.calorierecord
      vars:
        BUNDLE_ID: jp.nanairo.calorierecord
        XCODE_PROJECT: ios/Runner.xcodeproj
        XCODE_SCHEME: Runner
      groups:
        - app_store_connect  # Codemagic ダッシュボードで設定するグループ

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter パッケージ取得
        script: flutter pub get

      - name: テスト実行
        script: flutter test

      - name: iOS ビルド (IPA)
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>785YQ4QVC3</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>jp.nanairo.calorierecord</key>
              <string>diet_app_appstore</string>
            </dict>
          </dict>
          </plist>
          EOF
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - register01010@gmail.com
        notify:
          success: true
          failure: true
