workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.nanairo.calorierecord
      vars:
        BUNDLE_ID: jp.nanairo.calorierecord
        XCODE_PROJECT: ios/Runner.xcodeproj
        XCODE_SCHEME: Runner
      groups:
        - app_store_connect  # Codemagic ダッシュボードで設定するグループ

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter パッケージ取得
        script: flutter pub get

      - name: テスト実行
        script: flutter test

      - name: iOS ビルド (IPA)
        script: |
          xcode-project use-profiles
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - register01010@gmail.com
        notify:
          success: true
          failure: true
